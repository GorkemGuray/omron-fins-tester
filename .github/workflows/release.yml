name: Build and Release Windows Executable

on:
  push:
    tags:
      - 'v*' # Sadece 'v' ile başlayan tag'lerde çalışır (örn: v1.0.0)

permissions:
  contents: write # Release oluşturabilmek için gerekli

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build executable
        run: |
          # PyQt uygulamaları için --onefile (tek dosya) kullanıyoruz. --windowed ise konsol penceresini gizler.
          # --paths src ile Python yollarını belirtiyoruz ki modüller bulunabilsin.
          # style.qss dosyasını da paket içerisine dahil ediyoruz.
          uv run pyinstaller --noconfirm --onefile --windowed --paths src --add-data "src/omron_fins_tester/gui/style.qss;omron_fins_tester/gui" --name "OmronFinsTester" src/omron_fins_tester/main.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OmronFinsTester.exe
          generate_release_notes: true
